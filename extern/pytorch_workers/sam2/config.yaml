    variant: tiny
    automatic:
      points_per_side: 32
      points_per_batch: 64
      pred_iou_thresh: 0.8
      stability_score_thresh: 0.95
      box_nms_thresh: 0.7
      crop_n_layers: 0
      max_masks: 0
