# SAM2 inference-only worker defaults.
weights: null
repository: deepdetect-models/sam2
service_name: python-sam2-infer
nclasses: 1
width: 1024
height: 1024
batch_size: 1
gpu: false
gpuid: null
output: null
visualize: false
benchmark: false
warmup: 0
output_format: json
bbox_files: null
service_mllib:
